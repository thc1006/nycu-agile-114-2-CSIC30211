<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>選擇身份 · CampusEats</title>
<meta name="description" content="選擇進入 CampusEats 的身份：訂餐者或帶餐者。" />
<link rel="stylesheet" href="css/campus.css" />
<style>
  /* mirrors web register.html: a pure role-chooser that hands off to login */
  .reg-top {
    background: var(--fg); color: var(--bg);
    padding: calc(40px + env(safe-area-inset-top)) var(--space-5) 32px;
  }
  .reg-top .brand-mark { font-size: var(--text-2xl); }
  .reg-top h1 { font-size: var(--text-xl); margin-top: var(--space-4); letter-spacing: -0.02em; }
  .reg-top p { color: rgba(255,255,255,.7); font-size: var(--text-sm); margin-top: 6px; max-width: 34ch; }
  .reg-body { padding: var(--space-6) var(--space-5) var(--space-8); display: flex; flex-direction: column; gap: var(--space-4); }
  .role-card {
    display: flex; flex-direction: column; gap: var(--space-3);
    padding: var(--space-5); border: 1px solid var(--border-soft); border-radius: var(--radius-lg);
    background: var(--surface); transition: border-color var(--motion-fast), box-shadow var(--motion-fast);
  }
  .role-card:active { border-color: var(--fg); box-shadow: inset 0 0 0 1px var(--fg); }
  .role-card__icon { width: 48px; height: 48px; border-radius: 50%; background: var(--surface-warm); display: grid; place-items: center; }
  .role-card__icon svg { width: 24px; height: 24px; stroke: var(--fg); stroke-width: 2; fill: none; }
  .role-card .k { font-family: var(--font-mono); font-size: var(--text-xs); letter-spacing: .06em; text-transform: uppercase; color: var(--meta); }
  .role-card h2 { font-size: var(--text-lg); }
  .role-card .desc { color: var(--muted); font-size: var(--text-sm); }
  .reg-note { font-size: var(--text-sm); color: var(--muted); line-height: 1.6; margin-top: var(--space-2); }
  .reg-note strong { color: var(--fg); font-weight: 700; }
  .reg-alt { text-align: center; font-size: var(--text-sm); color: var(--muted); margin-top: var(--space-3); }
  .reg-alt a { color: var(--fg); font-weight: 700; text-decoration: underline; }
</style>
</head>
<body>
<main class="app" data-od-id="register">
  <div class="reg-top">
    <div class="brand-mark" data-brand-mark data-no-role>CampusEats</div>
    <h1>這次想用哪一種身份進入？</h1>
    <p>訂餐者與帶餐者是兩條各自獨立的流程。先選身份，下一步用學校 Email 登入。</p>
  </div>

  <div class="reg-body">
    <a class="role-card" href="login.html?role=orderer" data-od-id="role-orderer" data-no-role>
      <span class="role-card__icon"><svg viewBox="0 0 24 24"><path d="M3 7h18M6 7v13a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V7M9 7V5a3 3 0 0 1 6 0v2"/></svg></span>
      <span class="k">訂餐者</span>
      <h2>我要訂餐</h2>
      <p class="desc">沒空買飯，發一張帶餐需求，請順路的同學幫你帶。可追蹤狀態、確認收餐、為帶餐者評價。</p>
      <span class="btn btn-black btn--block btn--lg">以訂餐者身份登入 →</span>
    </a>

    <a class="role-card" href="login.html?role=runner" data-od-id="role-runner" data-no-role>
      <span class="role-card__icon"><svg viewBox="0 0 24 24"><path d="M13 3l-2 5h4l-3 8M5 13h4M15 13h4"/><circle cx="6.5" cy="18.5" r="2.5"/><circle cx="17.5" cy="18.5" r="2.5"/></svg></span>
      <span class="k">帶餐者</span>
      <h2>我要帶餐</h2>
      <p class="desc">本來就要外出，順路接單賺帶餐費。上線後瀏覽待接、接單鎖定、更新狀態、查看收入明細。</p>
      <span class="btn btn-white btn--block btn--lg">以帶餐者身份登入 →</span>
    </a>

    <p class="reg-note">兩種身份共用同一個學校帳號，但畫面與資料<strong>完全分開</strong>：帶單紀錄不會出現在訂單紀錄裡。要換身份，回到這頁重新選擇即可。</p>
    <p class="reg-alt">已經有身份？<a href="login.html" data-no-role>直接登入</a></p>
  </div>
</main>

<script src="js/campus.js"></script>
</body>
</html>
