<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>登入 · CampusEats</title>
<link rel="stylesheet" href="css/campus.css" />
<style>
  /* login is a focused, chrome-light screen */
  .login-top {
    background: var(--fg); color: var(--bg);
    padding: 40px var(--space-5) 32px;
  }
  .login-top .brand-mark { font-size: var(--text-2xl); }
  .login-top p { color: rgba(255,255,255,.7); font-size: var(--text-sm); margin-top: 6px; }
  .login-body { padding: var(--space-6) var(--space-5) var(--space-8); display: flex; flex-direction: column; gap: var(--space-5); }
  .role-pick { display: grid; gap: var(--space-3); }
  .role-opt {
    display: flex; align-items: center; gap: var(--space-4);
    padding: 18px; border: 1px solid var(--border-soft); border-radius: var(--radius-lg);
    cursor: pointer; transition: border-color var(--motion-fast), background var(--motion-fast);
  }
  .role-opt input { position: absolute; opacity: 0; pointer-events: none; }
  .role-opt:has(input:checked) { border-color: var(--fg); background: var(--surface-warm); box-shadow: inset 0 0 0 1px var(--fg); }
  .role-opt__icon { width: 48px; height: 48px; border-radius: 50%; background: var(--surface-warm); display: grid; place-items: center; flex: 0 0 auto; }
  .role-opt:has(input:checked) .role-opt__icon { background: var(--fg); }
  .role-opt:has(input:checked) .role-opt__icon svg { stroke: var(--bg); }
  .role-opt__icon svg { width: 24px; height: 24px; stroke: var(--fg); stroke-width: 2; fill: none; }
  .role-opt__txt strong { display: block; font-size: var(--text-base); }
  .role-opt__txt span { font-size: var(--text-sm); color: var(--muted); }
  .role-opt__check { margin-left: auto; width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border-soft); display: grid; place-items: center; flex: 0 0 auto; }
  .role-opt:has(input:checked) .role-opt__check { background: var(--fg); border-color: var(--fg); }
  .role-opt__check svg { width: 12px; height: 12px; stroke: var(--bg); stroke-width: 3; fill: none; opacity: 0; }
  .role-opt:has(input:checked) .role-opt__check svg { opacity: 1; }
  .legal { font-size: var(--text-xs); color: var(--meta); text-align: center; line-height: 1.5; }
  .legal a { text-decoration: underline; }
</style>
</head>
<body>
<main class="app" data-od-id="login">
  <div class="login-top">
    <div class="brand-mark" data-brand-mark>CampusEats</div>
    <p>校園帶餐媒合 · 學生幫學生</p>
  </div>

  <div class="login-body">
    <div>
      <h1 class="h-page">登入</h1>
      <p class="muted body-sm" style="margin-top:6px;">用學校 Email 進入，選擇這次要使用的身份。</p>
    </div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="email">學校 Email<span class="req">*</span></label>
        <input class="control" type="email" id="email" name="email" placeholder="you@campus.edu" autocomplete="email" value="student@campus.edu" />
        <div class="field__error">請輸入有效的學校 Email</div>
      </div>
      <div class="field">
        <label for="pw">密碼<span class="req">*</span></label>
        <input class="control" type="password" id="pw" name="pw" placeholder="輸入密碼" autocomplete="current-password" value="demo1234" />
        <div class="field__error">請輸入密碼</div>
      </div>

      <div class="field" style="margin-bottom:var(--space-3);">
        <label>這次要進入哪一種視角？<span class="req">*</span></label>
        <span class="hint">兩種視角是各自獨立的體驗，登入後只會看到所選身份的畫面。要換到另一種身份，回到這個登入頁重新選擇即可。</span>
      </div>

      <div class="role-pick" role="radiogroup" aria-label="選擇進入的視角">
        <label class="role-opt">
          <input type="radio" name="role" value="orderer" checked />
          <span class="role-opt__icon">
            <svg viewBox="0 0 24 24"><path d="M3 7h18M6 7v13a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V7M9 7V5a3 3 0 0 1 6 0v2"/></svg>
          </span>
          <span class="role-opt__txt"><strong>訂餐者視角</strong><span>沒空買飯，發單請順路的同學幫你帶</span></span>
          <span class="role-opt__check"><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg></span>
        </label>

        <label class="role-opt">
          <input type="radio" name="role" value="runner" />
          <span class="role-opt__icon">
            <svg viewBox="0 0 24 24"><path d="M13 3l-2 5h4l-3 8M5 13h4M15 13h4"/><circle cx="6.5" cy="18.5" r="2.5"/><circle cx="17.5" cy="18.5" r="2.5"/></svg>
          </span>
          <span class="role-opt__txt"><strong>帶餐者視角</strong><span>本來就要外出，順路接單賺帶餐費</span></span>
          <span class="role-opt__check"><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg></span>
        </label>
      </div>

      <a href="dashboard.html" id="continueBtn" role="button" class="btn btn-black btn--block btn--lg" style="margin-top:var(--space-6); text-decoration:none;">繼續</a>
    </form>

    <p class="legal">繼續即代表你同意 <a href="#" data-legal>服務條款</a> 與 <a href="#" data-legal>隱私政策</a>。</p>
  </div>
</main>

<script src="js/campus.js"></script>
<script>
  // preselect the role passed from landing / register (?role=orderer|runner)
  (function () {
    var r = new URLSearchParams(location.search).get("role");
    if (r === "runner" || r === "orderer") {
      var input = document.querySelector('input[name=role][value="' + r + '"]');
      if (input) input.checked = true;
    }
  })();

  // legal links are demo placeholders — acknowledge the tap, don't jump to top
  document.querySelectorAll("[data-legal]").forEach(function (a) {
    a.addEventListener("click", function (e) {
      e.preventDefault();
      toast(a.textContent.trim(), { icon: false });
    });
  });

  var form = document.getElementById("loginForm");
  var continueBtn = document.getElementById("continueBtn");

  function currentRole() {
    var checked = form.querySelector("input[name=role]:checked");
    return checked ? checked.value : "orderer";
  }
  // keep the link's real destination in sync with the chosen role, so the
  // tap is a genuine <a href> navigation — the one kind embedded previews
  // always allow, even when scripted window.location is sandboxed off.
  function syncHref() { continueBtn.setAttribute("href", CampusEats.home(currentRole())); }
  form.querySelectorAll("input[name=role]").forEach(function (r) {
    r.addEventListener("change", syncHref);
  });
  syncHref();

  function validate() {
    var ok = true;
    [document.getElementById("email"), document.getElementById("pw")].forEach(function (input) {
      var field = input.closest(".field");
      var valid = input.value.trim() !== "" && (input.type !== "email" || /.+@.+\..+/.test(input.value));
      field.classList.toggle("has-error", !valid);
      if (!valid) ok = false;
    });
    return ok;
  }

  // Happy path: validate, persist the role, then let the browser follow the
  // anchor natively (no preventDefault, no scripted location assignment).
  // Each role enters its own dedicated home — never a shared toggle.
  continueBtn.addEventListener("click", function (e) {
    if (!validate()) { e.preventDefault(); return; }
    CampusEats.setRole(currentRole());
    continueBtn.setAttribute("href", CampusEats.home(currentRole()));
    // fall through — native link navigation carries us to the role's home
  });

  // Enter key inside the form should behave like tapping 繼續.
  form.addEventListener("submit", function (e) {
    e.preventDefault();
    if (!validate()) return;
    CampusEats.setRole(currentRole());
    continueBtn.click();
  });
</script>
</body>
</html>
