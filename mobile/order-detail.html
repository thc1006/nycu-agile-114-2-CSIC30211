<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!-- role gate: accepting an order is a帶餐者-only action -->
<script>(function(){try{var u=new URLSearchParams(location.search).get("role");var r=u||localStorage.getItem("campuseats.role")||"orderer";if(u){try{localStorage.setItem("campuseats.role",u);}catch(e){}}if(r!=="runner")location.replace("dashboard.html?role=orderer");}catch(e){}})();</script>
<title>訂單詳情 · CampusEats</title>
<link rel="stylesheet" href="css/campus.css" />
<style>
  .detail-rest { font-size: var(--text-2xl); letter-spacing:-0.02em; }
  .person { display:flex; align-items:center; gap:var(--space-3); }
  .person .grow { min-width:0; }
  .person .name { font-weight:700; }
  .rating-line { display:flex; align-items:center; gap:5px; margin-top:2px; font-size:var(--text-sm); white-space:nowrap; }
  .rating-line .star-ic { width:15px; height:15px; fill:var(--fg); flex:0 0 auto; }
  .rating-line strong { font-weight:700; }
  .rating-line .muted { color:var(--muted); }
  .cust-tag { flex:0 0 auto; font-size:var(--text-xs); color:var(--muted); border:1px solid var(--border-soft); border-radius:var(--radius-pill); padding:3px 10px; }
  .items-box { background: var(--surface-warm); border-radius: var(--radius-md); padding: var(--space-4); }
  .items-box .line { display:flex; justify-content:space-between; gap:var(--space-3); padding:6px 0; }
  .items-box .line span:last-child { color: var(--muted); }
  .lockmsg { display:flex; align-items:center; gap:8px; font-size:var(--text-sm); color:var(--muted); justify-content:center; }
  .lockmsg svg { width:16px; height:16px; stroke:var(--muted); stroke-width:2; fill:none; }
</style>
</head>
<body>
<main class="app" data-od-id="order-detail">
  <header class="appbar">
    <a class="iconbtn" href="feed.html" aria-label="返回"><svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg></a>
    <div class="appbar__title">訂單詳情<small>CE-2052</small></div>
    <span class="iconbtn" aria-hidden="true"></span>
  </header>

  <div class="appbody appbody--nonav">
    <div class="between">
      <span class="badge badge--open">待接單</span>
      <span class="meta">發布於 11:58</span>
    </div>

    <div>
      <div class="detail-rest">研三舍餐廳</div>
      <p class="muted" style="margin-top:4px;">滷肉飯＋貢丸湯 · 2 項餐點</p>
    </div>

    <div class="items-box">
      <div class="line"><span>滷肉飯（大）</span><span>×1 · 加滷蛋</span></div>
      <div class="line"><span>貢丸湯</span><span>×1 · 不要香菜</span></div>
    </div>

    <dl style="margin:0;">
      <div class="kv"><dt>取餐地點</dt><dd>第二教學大樓 2F</dd></div>
      <div class="kv"><dt>期望送達</dt><dd>12:15 前</dd></div>
      <div class="kv"><dt>備註</dt><dd>我在 201 教室門口</dd></div>
      <div class="kv"><dt>付款</dt><dd>面交現金（餐費另計）</dd></div>
    </dl>

    <div class="card">
      <div class="person">
        <span class="avatar">美</span>
        <div class="grow">
          <div class="name">小美</div>
          <div class="rating-line">
            <svg class="star-ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2l2.9 6.1 6.7.9-4.9 4.6 1.2 6.6L12 18.6 6.1 20.8l1.2-6.6L2.4 9l6.7-.9z"/></svg>
            <strong>4.8</strong>
            <span class="muted">· 18 筆訂餐</span>
          </div>
        </div>
        <span class="cust-tag">訂餐者</span>
      </div>
    </div>

    <div class="between" style="padding:var(--space-2) 0;">
      <span class="muted">帶餐費</span>
      <span class="fee">$30</span>
    </div>

    <p class="lockmsg" id="lockNote"><svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>接單後此訂單會立即鎖定，其他人無法重複接</p>
  </div>

  <div class="actionbar">
    <button class="btn btn-black btn--block btn--lg" id="acceptBtn">接下這筆訂單 · $30</button>
  </div>
</main>

<script src="js/campus.js"></script>
<script>
  var btn = document.getElementById("acceptBtn");
  var note = document.getElementById("lockNote");
  btn.addEventListener("click", function () {
    // once locked, the button becomes a real navigation gesture
    if (btn.dataset.locked === "1") {
      window.location.href = "order-tracking.html?role=runner";
      return;
    }
    if (btn.disabled) return;
    btn.disabled = true;
    btn.textContent = "鎖定訂單中…";
    // simulate server lock check (prevents double-accept)
    setTimeout(function () {
      btn.dataset.locked = "1";
      btn.disabled = false;
      btn.textContent = "✓ 接單成功 · 前往購買流程";
      while (note.firstChild) note.removeChild(note.firstChild);
      note.textContent = "訂單已鎖定為你的，點按上方按鈕開始購買流程。";
    }, 700);
  });
</script>
</body>
</html>
