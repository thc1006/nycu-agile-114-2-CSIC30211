<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!-- role gate: this is the訂餐者 home; runners are bounced to their own home -->
<script>(function(){try{var u=new URLSearchParams(location.search).get("role");var r=u||localStorage.getItem("campuseats.role")||"orderer";if(u){try{localStorage.setItem("campuseats.role",u);}catch(e){}}if(r!=="orderer")location.replace("feed.html?role=runner");}catch(e){}})();</script>
<title>訂餐 · CampusEats</title>
<link rel="stylesheet" href="css/campus.css" />
<style>
  /* delivery-location row (Uber Eats home anchor) */
  .loc { display:flex; align-items:center; gap:8px; }
  .loc svg { width:18px; height:18px; stroke:var(--fg); stroke-width:2; fill:none; flex:0 0 auto; }
  .loc__txt { font-weight:700; font-size:var(--text-base); }
  .loc__chev { width:16px; height:16px; stroke:var(--muted); stroke-width:2.4; fill:none; }
  /* search-style entry → leads into the request form */
  .searchbar {
    display:flex; align-items:center; gap:10px;
    width:100%; padding:14px 16px;
    background:var(--surface-warm); border:none; border-radius:var(--radius-sm);
    color:var(--muted); font-size:var(--text-base); text-align:left;
  }
  .searchbar svg { width:20px; height:20px; stroke:var(--muted); stroke-width:2; fill:none; flex:0 0 auto; }
  .searchbar--live { padding:0; overflow:visible; }
  .searchbar--live svg { margin-left:16px; }
  .searchbar__input { flex:1; min-width:0; border:none; background:none; outline:none; padding:14px 16px 14px 10px; font:inherit; color:var(--fg); font-size:var(--text-base); border-radius:inherit; }
  .searchbar__input::placeholder { color:var(--muted); }
  .hero-action {
    background:var(--fg); color:var(--bg);
    border-radius:var(--radius-lg); padding:var(--space-6);
    display:flex; flex-direction:column; gap:var(--space-5);
  }
  .hero-action h2 { font-size:var(--text-xl); letter-spacing:-0.01em; }
  .hero-action p { color:rgba(255,255,255,.7); font-size:var(--text-sm); }
  .hero-action .btn-white { align-self:flex-start; }
  .sec-head { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:var(--space-3); }
  .sec-head a { font-size:var(--text-sm); font-weight:600; color:var(--muted); }
  /* order-again rail (horizontally scrollable, Uber Eats "Order again") */
  .rail { display:flex; gap:var(--space-3); overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
  .rail::-webkit-scrollbar { display:none; }
  .reorder {
    flex:0 0 auto; width:172px; padding:var(--space-4);
    border:1px solid var(--border-soft); border-radius:var(--radius-lg);
    display:flex; flex-direction:column; gap:6px;
  }
  .reorder .r-rest { font-weight:700; font-size:var(--text-base); letter-spacing:-0.01em; }
  .reorder .r-item { font-size:var(--text-sm); color:var(--muted); flex:1; }
  .reorder .r-foot { display:flex; align-items:center; justify-content:space-between; gap:var(--space-2); }
  /* only the "再發一次" pill is interactive — it floats up on hover */
  .reorder .r-again {
    font-size:var(--text-sm); font-weight:600;
    display:inline-flex; align-items:center; gap:5px;
    padding:6px 11px; border-radius:var(--radius-sm);
    background:var(--surface-warm); color:var(--fg);
    text-decoration:none; cursor:pointer; will-change:transform;
    transition:transform var(--motion-base) var(--ease-standard),
               box-shadow var(--motion-base) var(--ease-standard),
               background var(--motion-fast), color var(--motion-fast);
  }
  .reorder .r-again:hover, .reorder .r-again:focus-visible {
    background:var(--fg); color:var(--bg);
    transform:translateY(-4px) scale(1.05);
    box-shadow:var(--elev-raised);
    outline:none;
  }
  .reorder .r-again svg { width:15px; height:15px; stroke:currentColor; stroke-width:2; fill:none; }
  /* active order: only the timeline arrow is interactive — floats up on hover */
  .order-card__foot { display:flex; }
  .track-link {
    display:inline-flex; align-items:center; gap:6px;
    padding:6px 10px 6px 12px; border-radius:var(--radius-sm);
    color:var(--muted); font-size:var(--text-sm); font-weight:600;
    text-decoration:none; cursor:pointer; will-change:transform;
    transition:transform var(--motion-base) var(--ease-standard),
               box-shadow var(--motion-base) var(--ease-standard),
               background var(--motion-fast), color var(--motion-fast);
  }
  .track-link:hover, .track-link:focus-visible {
    background:var(--fg); color:var(--bg);
    transform:translateY(-4px) scale(1.03);
    box-shadow:var(--elev-raised);
    outline:none;
  }
  .track-link .rowlink__chev { display:inline-flex; }
  .track-link .rowlink__chev svg { width:18px; height:18px; }
  [hidden] { display:none !important; }
  /* location-picker rows render as buttons — strip native chrome */
  #locList .rowlink { width:100%; background:none; border:none; border-bottom:1px solid var(--border-soft); text-align:left; font:inherit; color:inherit; }
  #locList .rowlink:last-child { border-bottom:none; }
  #locList .rowlink:hover { background:var(--surface-warm); }
  #locList .rowlink__chev svg { stroke:var(--fg); }
</style>
</head>
<body>
<main class="app" data-od-id="dashboard">
  <header class="appbar">
    <button class="iconbtn" id="notifBtn" aria-label="通知"><svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0"/></svg></button>
    <div class="appbar__title" data-brand-mark>CampusEats</div>
    <a class="iconbtn" href="profile.html" aria-label="個人檔案"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg></a>
  </header>

  <div class="appbody">
    <!-- where it's coming to (Uber Eats delivers-to anchor, here = 取餐地點) -->
    <button class="loc" id="locBtn" aria-label="變更取餐地點" style="background:none;border:none;padding:0;">
      <svg viewBox="0 0 24 24"><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>
      <span class="loc__txt" id="locTxt">送到 · 圖書館 1F 大廳</span>
      <svg class="loc__chev" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
    </button>

    <!-- search-style entry into the request form -->
    <form class="searchbar searchbar--live" role="search" data-rest-search="navigate" onsubmit="return false;">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input class="searchbar__input" id="restSearch" name="restSearch" type="text" placeholder="想找人幫你帶什麼？例：阿嬤的飯桶、拉亞漢堡、茶壜…" aria-label="搜尋餐廳 / 店家" />
    </form>

    <div class="hero-action" data-od-id="orderer-cta">
      <div>
        <h2>沒空買飯？發一張帶餐需求</h2>
        <p>填好餐廳、餐點、取餐地點與帶餐費，順路的同學就能接單。</p>
      </div>
      <a class="btn btn-white" href="post-order.html">＋ 發布帶餐需求</a>
    </div>

    <!-- pinned active order (Uber Eats keeps the live order at the top) -->
    <div data-od-id="active-order-block">
      <div class="sec-head"><h2 class="h-sec">進行中</h2><a href="my-orders.html">全部</a></div>
      <div class="card" data-od-id="active-order">
        <div class="order-card__top">
          <div>
            <div class="order-card__rest">阿嬤的飯桶 · 雞腿便當</div>
            <div class="meta" style="margin-top:4px;">訂單 #CE-2048</div>
          </div>
          <span class="badge badge--buying">購買中</span>
        </div>
        <div class="order-card__meta">
          <div class="order-line"><svg viewBox="0 0 24 24"><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>圖書館 1F 大廳</div>
          <div class="order-line"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>希望 12:30 前送達 · 帶餐者 阿翔</div>
        </div>
        <div class="order-card__foot">
          <a class="track-link" href="order-tracking.html">點擊查看狀態時間軸<span class="rowlink__chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg></span></a>
        </div>
      </div>
    </div>

    <!-- order again (Uber Eats "Order again" rail) -->
    <div data-od-id="reorder-block">
      <div class="sec-head"><h2 class="h-sec">再發一次</h2><a href="my-orders.html">歷史</a></div>
      <div class="rail">
        <div class="reorder" data-reorder="mai">
          <div class="r-rest">拉亞漢堡</div>
          <div class="r-item">蛋餅＋紅茶微糖少冰</div>
          <div class="r-foot">
            <span class="fee r-fee" style="font-size:var(--text-base);">$23</span>
            <a class="r-again" href="post-order.html?reorder=mai">再發一次<svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7M21 4v5h-5"/></svg></a>
          </div>
        </div>
        <div class="reorder" data-reorder="wu">
          <div class="r-rest">茶壜</div>
          <div class="r-item">微糖少冰珍奶 ×1</div>
          <div class="r-foot">
            <span class="fee r-fee" style="font-size:var(--text-base);">$15</span>
            <a class="r-again" href="post-order.html?reorder=wu">再發一次<svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7M21 4v5h-5"/></svg></a>
          </div>
        </div>
        <div class="reorder" data-reorder="buf">
          <div class="r-rest">阿嬤的飯桶</div>
          <div class="r-item">三菜一肉便當</div>
          <div class="r-foot">
            <span class="fee r-fee" style="font-size:var(--text-base);">$20</span>
            <a class="r-again" href="post-order.html?reorder=buf">再發一次<svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7M21 4v5h-5"/></svg></a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <nav class="tabbar" data-tabbar data-active="home" data-od-id="tabbar"></nav>

  <!-- 取餐地點 picker -->
  <div class="sheet" id="locSheet" role="dialog" aria-modal="true" aria-labelledby="locSheetTitle">
    <div class="sheet__grip"></div>
    <h3 id="locSheetTitle">選擇取餐地點</h3>
    <p class="body-sm" style="margin-bottom:var(--space-3);">這是發單時預設帶入的取餐地點，每張需求仍可單獨修改。</p>
    <div id="locList">
      <button class="rowlink" type="button" data-loc="圖書館 1F 大廳">
        <span class="rowflex"><span class="rowlink__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg></span>圖書館 1F 大廳</span>
        <span class="rowlink__chev" data-check><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6L9 17l-5-5"/></svg></span>
      </button>
      <button class="rowlink" type="button" data-loc="工學院 3F 走廊">
        <span class="rowflex"><span class="rowlink__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg></span>工學院 3F 走廊</span>
        <span class="rowlink__chev" data-check hidden><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6L9 17l-5-5"/></svg></span>
      </button>
      <button class="rowlink" type="button" data-loc="綜合大樓 5F 實驗室">
        <span class="rowflex"><span class="rowlink__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg></span>綜合大樓 5F 實驗室</span>
        <span class="rowlink__chev" data-check hidden><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6L9 17l-5-5"/></svg></span>
      </button>
    </div>
  </div>
</main>

<script src="js/campus.js"></script>
<script>
  // hard guard in case JS-disabled head check was bypassed
  CampusEats.guard("orderer");

  // notifications — honest empty state (no unread items in the demo)
  document.getElementById("notifBtn").addEventListener("click", function () {
    toast("目前沒有新通知", { icon: false });
  });

  // 取餐地點 picker — updates the default pickup spot shown on the home anchor
  var locTxt = document.getElementById("locTxt");
  document.getElementById("locBtn").addEventListener("click", function () { openSheet("locSheet"); });
  document.getElementById("locList").addEventListener("click", function (e) {
    var row = e.target.closest("[data-loc]"); if (!row) return;
    var name = row.getAttribute("data-loc");
    locTxt.textContent = "送到 · " + name;
    document.querySelectorAll("#locList [data-check]").forEach(function (c) {
      c.hidden = c.closest("[data-loc]") !== row;
    });
    closeSheet("locSheet");
    toast("取餐地點已更新為 " + name);
  });

  // render each "再發一次" card's fee from its preset, so it matches exactly
  // what the request form will compute when reopened.
  document.querySelectorAll(".reorder[data-reorder]").forEach(function (card) {
    var p = CampusEats.REORDERS[card.getAttribute("data-reorder")];
    if (!p) return;
    var fee = CampusEats.fee({ qty: CampusEats.parseQty(p.items), urgency: CampusEats.urgencyOf(p.time) });
    var el = card.querySelector(".r-fee");
    if (el) el.textContent = "$" + fee.total;
  });
</script>
</body>
</html>
