<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>收入明細 · CampusEats</title>
<!-- role guard: must run before paint (runner-only page) -->
<script>
  (function () {
    try {
      var u = new URLSearchParams(location.search).get("role");
      var r = (u === "orderer" || u === "runner") ? u
            : (localStorage.getItem("campuseats.role") || "orderer");
      localStorage.setItem("campuseats.role", r === "runner" ? "runner" : "orderer");
    } catch (e) {}
  })();
</script>
<link rel="stylesheet" href="css/campus.css" />
<style>
  /* earnings hero — Uber Driver: big total leads, period + meta support */
  .earn-hero { display:flex; flex-direction:column; align-items:center; gap:6px; text-align:center; padding-block:var(--space-4) var(--space-2); }
  .earn-hero .period { font-size:var(--text-sm); color:var(--muted); }
  .earn-hero .big { font-family:var(--font-mono); font-variant-numeric:tabular-nums; font-size:clamp(48px,15vw,68px); font-weight:700; line-height:1; letter-spacing:-0.03em; }
  .earn-hero .sub { font-size:var(--text-sm); color:var(--meta); }
  /* weekly bar chart */
  .week { display:grid; grid-template-columns:repeat(7,1fr); gap:var(--space-2); align-items:end; height:120px; }
  .week .bar-col { display:flex; flex-direction:column; align-items:center; justify-content:flex-end; gap:8px; height:100%; }
  .week .bar { width:60%; max-width:22px; border-radius:var(--radius-sm); background:var(--surface-warm); }
  .week .bar.on { background:var(--fg); }
  .week .day { font-family:var(--font-mono); font-variant-numeric:tabular-nums; font-size:var(--text-xs); color:var(--meta); }
  .week .day.today { color:var(--fg); font-weight:700; }
  /* breakdown rows */
  .brk { display:flex; flex-direction:column; }
  .brk-row { display:flex; align-items:center; justify-content:space-between; padding:var(--space-3) 0; border-bottom:1px solid var(--border-soft); }
  .brk-row:last-of-type { border-bottom:none; }
  .brk-row .lbl { display:flex; align-items:center; gap:var(--space-2); font-size:var(--text-sm); }
  .brk-row .val { font-family:var(--font-mono); font-variant-numeric:tabular-nums; font-weight:600; }
  .brk-total { display:flex; align-items:center; justify-content:space-between; padding-top:var(--space-3); margin-top:var(--space-1); border-top:1.5px solid var(--fg); }
  .brk-total .lbl { font-weight:700; }
  .brk-total .val { font-family:var(--font-mono); font-variant-numeric:tabular-nums; font-weight:700; font-size:var(--text-xl); }
  /* per-trip list */
  .trip { display:flex; align-items:center; justify-content:space-between; gap:var(--space-3); padding:var(--space-3) 0; border-bottom:1px solid var(--border-soft); }
  .trip:last-child { border-bottom:none; }
  .trip .meta { display:flex; align-items:center; gap:var(--space-3); min-width:0; }
  .trip .tdot { width:34px; height:34px; flex:none; border-radius:var(--radius-sm); background:var(--surface-warm); display:flex; align-items:center; justify-content:center; }
  .trip .tdot svg { width:16px; height:16px; stroke:var(--fg); fill:none; stroke-width:2; }
  .trip .store { font-weight:600; font-size:var(--text-sm); }
  .trip .when { font-size:var(--text-xs); color:var(--meta); margin-top:2px; }
  .trip .amt { font-family:var(--font-mono); font-variant-numeric:tabular-nums; font-weight:700; }
  .sec-label { font-size:var(--text-xs); font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--meta); margin-bottom:var(--space-3); }
  /* mini stat strip */
  .mini { display:grid; grid-template-columns:repeat(3,1fr); text-align:center; }
  .mini > div { padding:var(--space-2) 0; }
  .mini > div + div { border-left:1px solid var(--border-soft); }
  .mini .n { font-family:var(--font-mono); font-variant-numeric:tabular-nums; font-weight:700; font-size:var(--text-lg); }
  .mini .l { font-size:var(--text-xs); color:var(--meta); margin-top:2px; }
</style>
</head>
<body>
<main class="app" data-od-id="runner-earnings">
  <header class="appbar">
    <a class="iconbtn" href="profile.html" aria-label="返回"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></a>
    <div class="appbar__title">收入明細</div>
    <span class="iconbtn" aria-hidden="true"></span>
  </header>

  <div class="appbody appbody--nonav">
    <!-- total hero — this month leads -->
    <div class="earn-hero">
      <div class="period">本月帶餐收入</div>
      <div class="big">$640</div>
      <div class="sub">5 月 1 日 – 5 月 29 日 · 32 趟</div>
    </div>

    <!-- this-week bar chart -->
    <section class="card">
      <div class="sec-label" style="margin-bottom:var(--space-3);">本週 · $185</div>
      <div class="week">
        <div class="bar-col"><span class="bar" style="height:30%"></span><span class="day">一</span></div>
        <div class="bar-col"><span class="bar" style="height:55%"></span><span class="day">二</span></div>
        <div class="bar-col"><span class="bar" style="height:20%"></span><span class="day">三</span></div>
        <div class="bar-col"><span class="bar on" style="height:80%"></span><span class="day">四</span></div>
        <div class="bar-col"><span class="bar on" style="height:100%"></span><span class="day today">五</span></div>
        <div class="bar-col"><span class="bar" style="height:0%"></span><span class="day">六</span></div>
        <div class="bar-col"><span class="bar" style="height:0%"></span><span class="day">日</span></div>
      </div>
      <div class="mini" style="margin-top:var(--space-4);border-top:1px solid var(--border-soft);">
        <div><div class="n">$60</div><div class="l">今日</div></div>
        <div><div class="n">2</div><div class="l">今日趟數</div></div>
        <div><div class="n">$20</div><div class="l">平均單趟</div></div>
      </div>
    </section>

    <!-- breakdown -->
    <section>
      <div class="sec-label">本月收入組成</div>
      <div class="card">
        <div class="brk">
          <div class="brk-row">
            <span class="lbl"><span class="rowlink__icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9.5 9.5h4a1.8 1.8 0 0 1 0 3.6h-3a1.8 1.8 0 0 0 0 3.6h4"/></svg></span>帶餐費</span>
            <span class="val">$512</span>
          </div>
          <div class="brk-row">
            <span class="lbl"><span class="rowlink__icon"><svg viewBox="0 0 24 24"><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg></span>距離加給</span>
            <span class="val">$48</span>
          </div>
          <div class="brk-row">
            <span class="lbl"><span class="rowlink__icon"><svg viewBox="0 0 24 24"><path d="M12 2l2.9 6.1 6.6.9-4.8 4.7 1.2 6.6L12 18.2 6.1 21.3l1.2-6.6L2.5 9l6.6-.9z"/></svg></span>訂餐者感謝金</span>
            <span class="val">$80</span>
          </div>
          <div class="brk-total">
            <span class="lbl">合計</span>
            <span class="val">$640</span>
          </div>
        </div>
      </div>
    </section>

    <!-- per-trip activity -->
    <section>
      <div class="sec-label">近期帶餐收入</div>
      <div class="card">
        <div class="trip">
          <div class="meta">
            <span class="tdot"><svg viewBox="0 0 24 24"><path d="M3 11h18l-1.5 9h-15zM7 11V8a5 5 0 0 1 10 0v3"/></svg></span>
            <div><div class="store">阿嬤的飯桶</div><div class="when">今天 12:30 · 圖書館 1F</div></div>
          </div>
          <span class="amt">+$30</span>
        </div>
        <div class="trip">
          <div class="meta">
            <span class="tdot"><svg viewBox="0 0 24 24"><path d="M3 11h18l-1.5 9h-15zM7 11V8a5 5 0 0 1 10 0v3"/></svg></span>
            <div><div class="store">茶壜</div><div class="when">今天 10:15 · 工學院</div></div>
          </div>
          <span class="amt">+$30</span>
        </div>
        <div class="trip">
          <div class="meta">
            <span class="tdot"><svg viewBox="0 0 24 24"><path d="M3 11h18l-1.5 9h-15zM7 11V8a5 5 0 0 1 10 0v3"/></svg></span>
            <div><div class="store">拉亞漢堡</div><div class="when">昨天 11:45 · 宿舍 B 棟</div></div>
          </div>
          <span class="amt">+$25</span>
        </div>
        <div class="trip">
          <div class="meta">
            <span class="tdot"><svg viewBox="0 0 24 24"><path d="M3 11h18l-1.5 9h-15zM7 11V8a5 5 0 0 1 10 0v3"/></svg></span>
            <div><div class="store">小木屋鬆餅</div><div class="when">5/27 10:20 · 圖書館 1F</div></div>
          </div>
          <span class="amt">+$20</span>
        </div>
        <div class="trip">
          <div class="meta">
            <span class="tdot"><svg viewBox="0 0 24 24"><path d="M3 11h18l-1.5 9h-15zM7 11V8a5 5 0 0 1 10 0v3"/></svg></span>
            <div><div class="store">茶壜</div><div class="when">5/26 14:00 · 工學院</div></div>
          </div>
          <span class="amt">+$30</span>
        </div>
      </div>
    </section>

    <p style="text-align:center;color:var(--meta);font-size:var(--text-xs);padding-block:var(--space-2) var(--space-4);">收款方式：面交現金 · 每週結算</p>
  </div>
  <nav class="tabbar" data-tabbar data-active="earn" data-od-id="tabbar"></nav>
</main>
<script src="js/campus.js"></script>
</body>
</html>
