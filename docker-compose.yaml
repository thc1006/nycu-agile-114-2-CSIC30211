services:
  frontend:
    image: node:22-alpine
    working_dir: /app
    command: >
      sh -c "if [ ! -d node_modules/vite ]; then npm ci; fi &&
      npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  frontend_node_modules:
