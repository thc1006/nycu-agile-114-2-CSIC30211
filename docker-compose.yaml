# Single source of truth for local dev: backend datastore (redis) + frontend.
# The FastAPI backend runs via uvicorn against redis:6379 (see docs/backend.md).
# `docker compose up -d redis` for backend dev; `... up -d frontend` for the UI.
services:
  redis:
    image: redis:7
    container_name: campuseats-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: >
      sh -c "if [ ! -d node_modules/vite ]; then npm ci; fi &&
      npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  frontend_node_modules:
