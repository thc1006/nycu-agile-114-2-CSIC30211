<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!-- role gate: 發單 is a訂餐者-only action -->
<script>(function(){try{var u=new URLSearchParams(location.search).get("role");var r=u||localStorage.getItem("campuseats.role")||"orderer";if(u){try{localStorage.setItem("campuseats.role",u);}catch(e){}}if(r!=="orderer")location.replace("feed.html?role=runner");}catch(e){}})();</script>
<title>發布帶餐需求 · CampusEats</title>
<link rel="stylesheet" href="css/campus.css" />
<style>
  .sum dt { color: var(--muted); }
  .sum dd { max-width: 60%; }
  .fee-note { font-size: var(--text-xs); color: var(--meta); margin-top:6px; }
  /* system-calculated fee card (read-only, Uber Eats fee-breakdown style) */
  .fee-calc { border:1px solid var(--border-soft); border-radius:var(--radius-md); padding:var(--space-4); }
  .fee-calc__rows { display:flex; flex-direction:column; gap:8px; }
  .fee-calc__rows .row { display:flex; align-items:center; justify-content:space-between; font-size:var(--text-sm); color:var(--muted); }
  .fee-calc__rows .row .amt { font-family:var(--font-mono); font-variant-numeric:tabular-nums; color:var(--fg); }
  .fee-calc__total { display:flex; align-items:center; justify-content:space-between; margin-top:var(--space-3); padding-top:var(--space-3); border-top:1px solid var(--fg); font-weight:700; }
  /* reorder banner */
  .reorder-banner { display:flex; align-items:center; gap:10px; background:var(--surface-warm); border-radius:var(--radius-md); padding:12px 14px; font-size:var(--text-sm); }
  .reorder-banner[hidden] { display:none; } /* author display:flex would otherwise override the UA [hidden] rule */
  .reorder-banner svg { width:18px; height:18px; stroke:var(--fg); stroke-width:2; fill:none; flex:0 0 auto; }
  /* failure feedback — persistent "無法訂餐" banner (replaces the easy-to-miss toast) */
  .order-error { display:flex; align-items:flex-start; gap:10px; background:color-mix(in srgb, var(--danger) 8%, var(--bg)); border:1px solid color-mix(in srgb, var(--danger) 40%, transparent); border-radius:var(--radius-md); padding:12px 14px; color:var(--danger); font-size:var(--text-sm); }
  .order-error[hidden] { display:none; }
  .order-error svg { width:18px; height:18px; stroke:currentColor; stroke-width:2.2; fill:none; flex:0 0 auto; margin-top:1px; }
  .order-error b { display:block; font-weight:700; margin-bottom:2px; }
  /* success state — full card-cover "訂餐成功" interface */
  .success-screen { position:fixed; top:0; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:var(--app-max); z-index:100; background:var(--bg); display:flex; flex-direction:column; padding:var(--space-8) var(--space-5) calc(var(--space-6) + env(safe-area-inset-bottom)); overflow-y:auto; animation:successIn var(--motion-base) var(--ease-standard); }
  .success-screen[hidden] { display:none; }
  @keyframes successIn { from { opacity:0; } to { opacity:1; } }
  .success-screen__check { width:72px; height:72px; border-radius:50%; background:var(--fg); display:grid; place-items:center; margin:var(--space-2) 0 var(--space-5); animation:checkPop 360ms var(--ease-standard) both; }
  @keyframes checkPop { 0% { transform:scale(.6); opacity:0; } 60% { transform:scale(1.08); } 100% { transform:scale(1); opacity:1; } }
  .success-screen__check svg { width:38px; height:38px; stroke:var(--bg); stroke-width:2.6; fill:none; }
  .success-screen h2 { font-size:var(--text-2xl); margin-bottom:var(--space-2); }
  .success-screen .lead { color:var(--muted); font-size:var(--text-sm); margin-bottom:var(--space-5); max-width:34ch; }
  .success-screen .spacer { flex:1; min-height:var(--space-5); }
</style>
</head>
<body>
<main class="app" data-od-id="post-order">
  <header class="appbar">
    <a class="iconbtn" href="dashboard.html" aria-label="取消"><svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></a>
    <div class="appbar__title">發布帶餐需求</div>
    <span style="width:44px"></span>
  </header>

  <form class="appbody appbody--nonav" id="orderForm" novalidate>
    <div class="reorder-banner" id="reorderBanner" hidden>
      <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7M21 4v5h-5"/></svg>
      <span>已帶入上次「<strong id="reorderName"></strong>」的內容，確認或修改後即可再發一次。</span>
    </div>
    <div class="order-error" id="orderError" hidden role="alert">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 7v5M12 16h.01"/></svg>
      <span><b>無法訂餐</b>還有必填欄位未完成，請補齊標示紅色的欄位後再送出。</span>
    </div>
    <p class="body-sm">標 <span style="color:var(--danger)">*</span> 為必填。資訊越清楚，順路的同學越敢接單。</p>

    <div class="field">
      <label for="restaurant">餐廳 / 店家<span class="req">*</span></label>
      <input class="control" id="restaurant" name="restaurant" placeholder="例：學餐二樓、麥味登、五十嵐" />
      <div class="field__error"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>請填寫餐廳或店家名稱</div>
    </div>

    <div class="field">
      <label for="items">餐點內容<span class="req">*</span></label>
      <textarea class="control" id="items" name="items" placeholder="例：雞腿便當 ×1（不要辣、加滷蛋）、紅茶微糖少冰 ×1"></textarea>
      <span class="hint">寫清楚品項、數量與客製（辣度、冰塊、加料），避免買錯。</span>
      <div class="field__error"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>請描述要帶的餐點</div>
    </div>

    <div class="field">
      <label for="spot">取餐地點<span class="req">*</span></label>
      <input class="control" id="spot" name="spot" placeholder="例：圖書館 1F 大廳、工學院 3F 走廊" />
      <div class="field__error"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>請填寫取餐地點</div>
    </div>

    <div class="field">
      <label for="time">期望送達時間<span class="req">*</span></label>
      <select class="control" id="time" name="time">
        <option value="">選擇時間</option>
        <option>越快越好（30 分鐘內）</option>
        <option>11:30 前</option>
        <option>12:00 前</option>
        <option>12:30 前</option>
        <option>13:00 前</option>
        <option>14:00 前</option>
      </select>
      <div class="field__error"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>請選擇期望送達時間</div>
    </div>

    <div class="field">
      <label>帶餐費<span class="ro" style="font-weight:500;color:var(--meta);font-size:var(--text-xs);margin-left:6px;">系統依份量與時段自動計算</span></label>
      <div class="fee-calc" id="feeCalc">
        <div class="fee-calc__rows" id="feeRows"></div>
        <div class="fee-calc__total"><span>帶餐費</span><span class="fee" id="feeTotal">$15</span></div>
      </div>
      <p class="fee-note">校園統一費率，訂餐者無法自訂——和 Uber Eats 一樣由系統計算，確保價格透明、帶餐者收入公平。</p>
    </div>

    <div class="field">
      <label for="note">備註（選填）</label>
      <textarea class="control" id="note" name="note" placeholder="例：我會在大廳沙發區、找不到可以打電話給我"></textarea>
    </div>
  </form>

  <div class="actionbar">
    <button class="btn btn-black btn--block btn--lg" id="reviewBtn" form="orderForm" type="submit">檢視並確認</button>
  </div>

  <!-- 訂餐成功 — full-page success interface -->
  <section class="success-screen" id="successScreen" hidden role="dialog" aria-modal="true" aria-labelledby="successTitle" data-od-id="order-success">
    <div class="success-screen__check">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
    </div>
    <h2 id="successTitle">訂餐成功</h2>
    <p class="lead">已送出帶餐需求，將出現在帶餐者的待接列表。接單前你都可以取消。</p>
    <dl class="sum" id="summary"></dl>
    <div class="between" style="margin-top:var(--space-5); padding-top:var(--space-4); border-top:1px solid var(--fg);">
      <span style="font-weight:600;">帶餐費</span>
      <span class="fee" id="sumFee">$20</span>
    </div>
    <div class="spacer"></div>
    <div class="stack-3">
      <button class="btn btn-black btn--block btn--lg" id="confirmBtn">查看訂單進度</button>
      <a class="btn btn-ghost btn--block" href="dashboard.html?role=orderer">返回首頁</a>
    </div>
  </section>
</main>

<script src="js/campus.js"></script>
<script>
  var form = document.getElementById("orderForm");
  var requiredText = ["restaurant", "items", "spot"];
  var feeRowsEl = document.getElementById("feeRows");
  var feeTotalEl = document.getElementById("feeTotal");
  var currentFee = CampusEats.fee({ qty: 1, urgency: "normal" });

  // system-calculated fee: recomputed from item count + time slot, never edited
  function recomputeFee() {
    var qty = CampusEats.parseQty(document.getElementById("items").value);
    var urgency = CampusEats.urgencyOf(document.getElementById("time").value);
    currentFee = CampusEats.fee({ qty: qty, urgency: urgency });
    while (feeRowsEl.firstChild) feeRowsEl.removeChild(feeRowsEl.firstChild);
    currentFee.parts.forEach(function (p, i) {
      var row = document.createElement("div"); row.className = "row";
      var l = document.createElement("span"); l.textContent = p.label;
      var a = document.createElement("span"); a.className = "amt";
      a.textContent = (i === 0 ? "$" : "+$") + p.amount;
      row.appendChild(l); row.appendChild(a); feeRowsEl.appendChild(row);
    });
    feeTotalEl.textContent = "$" + currentFee.total;
  }

  function validate() {
    var ok = true, firstBad = null;
    requiredText.forEach(function (id) {
      var input = document.getElementById(id), field = input.closest(".field");
      var valid = input.value.trim() !== "";
      field.classList.toggle("has-error", !valid);
      if (!valid) { ok = false; firstBad = firstBad || field; }
    });
    var time = document.getElementById("time"), tf = time.closest(".field");
    var timeOk = time.value !== "";
    tf.classList.toggle("has-error", !timeOk);
    if (!timeOk) { ok = false; firstBad = firstBad || tf; }
    if (!ok && firstBad) firstBad.querySelector(".control").focus();
    return ok;
  }

  function esc(s) { return s; } // textContent assignment handles escaping
  function addRow(dl, label, value) {
    var dt = document.createElement("dt"); dt.textContent = label;
    var dd = document.createElement("dd"); dd.textContent = value;
    var div = document.createElement("div"); div.className = "kv";
    div.appendChild(dt); div.appendChild(dd); dl.appendChild(div);
  }

  var orderError = document.getElementById("orderError");
  form.addEventListener("submit", function (e) {
    e.preventDefault();
    // incomplete required fields → clear "無法訂餐" message (persistent, not a fleeting toast)
    if (!validate()) {
      orderError.hidden = false;
      toast("無法訂餐", { icon: false });
      return;
    }
    // complete → place the order and show the 訂餐成功 interface
    orderError.hidden = true;
    recomputeFee();
    var dl = document.getElementById("summary");
    while (dl.firstChild) dl.removeChild(dl.firstChild);
    addRow(dl, "餐廳", document.getElementById("restaurant").value.trim());
    addRow(dl, "餐點", document.getElementById("items").value.trim());
    addRow(dl, "取餐地點", document.getElementById("spot").value.trim());
    addRow(dl, "送達時間", document.getElementById("time").value);
    var note = document.getElementById("note").value.trim();
    if (note) addRow(dl, "備註", note);
    document.getElementById("sumFee").textContent = "$" + currentFee.total;
    document.getElementById("successScreen").hidden = false;
  });

  document.getElementById("confirmBtn").addEventListener("click", function () {
    // navigate synchronously within the user gesture (sandboxed previews
    // block navigation deferred outside the activation window)
    window.location.href = "order-tracking.html?role=orderer";
  });

  // clear error as user types + keep the system fee in sync
  form.addEventListener("input", function (e) {
    var field = e.target.closest(".field");
    if (field && field.classList.contains("has-error") && e.target.value.trim() !== "") field.classList.remove("has-error");
    // hide the "無法訂餐" banner once all required fields are filled again
    if (!orderError.hidden && !form.querySelector(".field.has-error")) orderError.hidden = true;
    recomputeFee();
  });
  form.addEventListener("change", function (e) {
    var field = e.target.closest(".field");
    if (field && field.classList.contains("has-error") && e.target.value.trim() !== "") field.classList.remove("has-error");
    if (!orderError.hidden && !form.querySelector(".field.has-error")) orderError.hidden = true;
    recomputeFee();
  });

  // "再發一次" → load the previous order back into the form (Uber Eats "Order again")
  (function prefill() {
    var id = new URLSearchParams(location.search).get("reorder");
    var preset = id && CampusEats.REORDERS[id];
    if (!preset) { recomputeFee(); return; }
    document.getElementById("restaurant").value = preset.restaurant;
    document.getElementById("items").value = preset.items;
    document.getElementById("spot").value = preset.spot;
    var timeSel = document.getElementById("time");
    var matched = Array.prototype.some.call(timeSel.options, function (o) {
      if (o.value === preset.time || o.textContent.trim() === preset.time) { o.selected = true; return true; }
      return false;
    });
    if (!matched && preset.time) timeSel.add(new Option(preset.time, preset.time, true, true));
    document.getElementById("note").value = preset.note || "";
    document.getElementById("reorderName").textContent = preset.restaurant;
    document.getElementById("reorderBanner").hidden = false;
    document.querySelector(".appbar__title").textContent = "再發一次";
    recomputeFee();
  })();
</script>
</body>
</html>
