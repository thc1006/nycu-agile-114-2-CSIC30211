name: Backend CI

# 在 PR 進 main、以及 push 到 main / backend 時觸發。
# 注意:目前後端程式碼位於 `backend` 分支;當某個 ref 沒有後端程式碼
# (例如純文件分支)時,測試步驟會優雅跳過,不會產生誤導性的失敗。
on:
  push:
    branches: [main, backend]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (FastAPI + Redis)
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Detect backend code
        id: detect
        run: |
          if [ -f requirements.txt ] && [ -d tests ]; then
            echo "has_backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_backend=false" >> "$GITHUB_OUTPUT"
            echo "::notice::此 ref 沒有後端程式碼(可能是純文件分支),略過 pytest。"
          fi

      - name: Set up Python 3.12
        if: steps.detect.outputs.has_backend == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        if: steps.detect.outputs.has_backend == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        if: steps.detect.outputs.has_backend == 'true'
        env:
          REDIS_HOST: localhost
          REDIS_PORT: '6379'
          REDIS_DB: '15'
          REDIS_PASSWORD: ''
          JWT_SECRET_KEY: ci-test-secret-key
        run: python -m pytest -q
