name: Backend CI

# Proposed in the PR #9 review: makes the existing pytest suite an ENFORCED gate
# on every PR/push (the suite currently only runs via a local, bypassable
# pre-push hook — see issue #7). Add this workflow as a required status check in
# branch protection so red tests block merge.

on:
  pull_request:
    branches: [main, backend]
  push:
    branches: [main, backend]

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests + coverage gate
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      REDIS_DB: "15"
      # CI-only secret; must be >= 32 bytes so PyJWT does not warn (see issue #8).
      JWT_SECRET_KEY: ci-only-secret-key-at-least-32-bytes-long-xxxx
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check app tests
      - name: Format check (ruff, advisory until baseline)
        # Existing code predates `ruff format`; run `ruff format app tests` once
        # to baseline, then drop continue-on-error to make this a hard gate.
        run: ruff format --check app tests
        continue-on-error: true
      - name: Type check (mypy, advisory)
        run: mypy app
        continue-on-error: true
      - name: Run tests with branch coverage + gate
        run: >-
          pytest
          --cov=app --cov-branch
          --cov-report=term-missing --cov-report=xml
          --cov-fail-under=90
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  security:
    name: SAST + dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install security tooling
        run: pip install bandit pip-audit
      - name: SAST (bandit, medium+ severity)
        run: bandit -r app -ll
      - name: Dependency vulnerability audit (pip-audit)
        run: pip-audit -r requirements.txt
