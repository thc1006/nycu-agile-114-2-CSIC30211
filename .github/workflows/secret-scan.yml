name: Secret Scan

# Repo-wide secret scanning (gitleaks) — the one pipeline control missing from
# both PR #1's CI and current main (flagged in the PR #1 review). Blocks merge if
# a credential/token is introduced. Uses .gitleaks.toml at the repo root, which
# allowlists ONLY verified test fixtures + doc placeholders. Full-history scan was
# verified clean at the time this was added.
on:
  pull_request:
  push:
    branches: [main, backend]

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so historical commits are scanned too
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
