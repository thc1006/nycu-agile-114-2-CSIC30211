# Automated dependency-update PRs (SCA hygiene). Each opened PR runs the full CI
# gate before it can merge. npm covers the frontend; pip covers the FastAPI backend;
# github-actions keeps the workflow actions patched.
version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      frontend-dev:
        dependency-type: development

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
