<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>訂單詳情 · CampusEats</title>
<!-- role guard: must run before paint -->
<script>
  (function () {
    try {
      // URL role wins (it survives sandboxes where localStorage is wiped);
      // fall back to whatever's stored, else orderer. Keeps the record's
      // owner-role aligned before paint so we don't flash the wrong view.
      var u = new URLSearchParams(location.search).get("role");
      var r = (u === "orderer" || u === "runner") ? u
            : (localStorage.getItem("campuseats.role") || "orderer");
      localStorage.setItem("campuseats.role", r === "runner" ? "runner" : "orderer");
    } catch (e) {}
  })();
</script>
<link rel="stylesheet" href="css/campus.css" />
<style>
  /* status hero */
  .hd-hero { display:flex; flex-direction:column; gap:var(--space-3); }
  .hd-hero .hd-rest { font-size:var(--text-2xl); font-weight:700; letter-spacing:-0.02em; }
  .hd-hero .hd-meta { font-family:var(--font-mono); font-size:var(--text-xs); color:var(--meta); letter-spacing:.04em; text-transform:uppercase; }
  .sec-label { font-size:var(--text-xs); font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--meta); margin-bottom:var(--space-3); }
  /* counterpart row */
  .party { display:flex; align-items:center; gap:var(--space-3); }
  .party .who { font-weight:700; font-size:var(--text-base); }
  .party .role { font-size:var(--text-xs); color:var(--meta); margin-top:2px; }
  /* fee */
  .fee-row { display:flex; align-items:baseline; justify-content:space-between; }
  .fee-row .fee-big { font-family:var(--font-mono); font-variant-numeric:tabular-nums; font-weight:700; font-size:var(--text-2xl); }
  /* timeline read-only (all done) */
  .tl-step.is-cancel .tl-dot { background:var(--danger); border-color:var(--danger); }
  .tl-step.is-cancel .tl-dot svg { opacity:1; }
  .tl-step.is-cancel::before { background:var(--danger); }
  .tl-step.is-cancel .tl-title { color:var(--danger); }
  /* rating blocks */
  .rate-block + .rate-block { margin-top:var(--space-4); padding-top:var(--space-4); border-top:1px solid var(--border-soft); }
  .rate-block .rb-head { display:flex; align-items:center; justify-content:space-between; gap:var(--space-3); margin-bottom:var(--space-2); }
  .rate-block .rb-who { font-size:var(--text-sm); font-weight:600; }
  .rate-block .rb-comment { font-size:var(--text-sm); color:var(--muted); margin-top:6px; }
  .rate-block .rb-pending { font-size:var(--text-sm); color:var(--meta); }
  .rb-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .rb-tags .tag { font-size:var(--text-xs); }
  .link-cta { font-size:var(--text-sm); font-weight:600; color:var(--fg); text-decoration:underline; white-space:nowrap; }
  [hidden]{display:none !important;}
</style>
</head>
<body>
<main class="app" data-od-id="history-detail">
  <header class="appbar">
    <a class="iconbtn" href="my-orders.html" aria-label="返回"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></a>
    <div class="appbar__title">訂單詳情</div>
    <span class="iconbtn" aria-hidden="true"></span>
  </header>

  <div class="appbody appbody--nonav">

    <!-- status hero -->
    <div class="card hd-hero" data-od-id="hd-status">
      <div class="between">
        <span class="hd-meta" id="hdId">CE-0000</span>
        <span class="badge" id="hdBadge">—</span>
      </div>
      <div class="hd-rest" id="hdRest">—</div>
      <div class="hd-meta" id="hdDate">—</div>
    </div>

    <!-- order content -->
    <div data-od-id="hd-content">
      <p class="sec-label">訂單內容</p>
      <div class="card">
        <dl style="margin:0;">
          <div class="kv"><dt>餐點品項</dt><dd id="hdItems">—</dd></div>
          <div class="kv"><dt>取餐地點</dt><dd id="hdSpot">—</dd></div>
          <div class="kv"><dt>取餐時間</dt><dd id="hdDeadline">—</dd></div>
          <div class="kv"><dt>訂單編號</dt><dd class="num" id="hdId2">—</dd></div>
        </dl>
      </div>
    </div>

    <!-- counterpart -->
    <div data-od-id="hd-party" id="hdPartyWrap">
      <p class="sec-label" id="hdPartyLabel">帶餐者</p>
      <div class="card party">
        <span class="avatar" id="hdAvatar">—</span>
        <div>
          <div class="who" id="hdPartyName">—</div>
          <div class="role" id="hdPartyRole">—</div>
        </div>
      </div>
    </div>

    <!-- fee -->
    <div data-od-id="hd-fee">
      <p class="sec-label">帶餐費</p>
      <div class="card">
        <div class="fee-row">
          <span class="muted" style="font-size:var(--text-sm);">系統計算帶餐費</span>
          <span class="fee-big" id="hdFee">$0</span>
        </div>
        <p class="body-sm" style="margin-top:var(--space-2);">由系統依距離、餐點份量與時段固定計算，下單前已確認，雙方不另議價。</p>
      </div>
    </div>

    <!-- lifecycle timeline -->
    <div data-od-id="hd-timeline">
      <p class="sec-label">訂單進度</p>
      <div class="card">
        <div class="timeline" id="hdTimeline"></div>
      </div>
    </div>

    <!-- cancellation reason (cancelled only) -->
    <div data-od-id="hd-cancel" id="hdCancelWrap" hidden>
      <p class="sec-label">取消原因</p>
      <div class="card">
        <p class="body-sm" id="hdCancelReason" style="color:var(--muted);">—</p>
      </div>
    </div>

    <!-- ratings (completed only) -->
    <div data-od-id="hd-ratings" id="hdRatingsWrap" hidden>
      <p class="sec-label">評價紀錄</p>
      <div class="card">
        <!-- rating you gave -->
        <div class="rate-block">
          <div class="rb-head">
            <span class="rb-who" id="hdYouLabel">你給對方的評價</span>
            <a class="link-cta" id="hdYouCta" hidden href="#">前往評價</a>
          </div>
          <div id="hdYouRated" hidden>
            <span class="stars stars--static" data-stars data-readonly data-value="0" data-max="5" id="hdYouStars"></span>
            <div class="rb-tags" id="hdYouTags" hidden></div>
            <p class="rb-comment" id="hdYouComment" hidden></p>
          </div>
          <p class="rb-pending" id="hdYouPending" hidden>這筆訂單你尚未評價對方。</p>
        </div>
        <!-- rating you received -->
        <div class="rate-block">
          <div class="rb-head">
            <span class="rb-who" id="hdThemLabel">對方給你的評價</span>
          </div>
          <div id="hdThemRated" hidden>
            <span class="stars stars--static" data-stars data-readonly data-value="0" data-max="5" id="hdThemStars"></span>
            <p class="rb-comment" id="hdThemComment" hidden></p>
          </div>
          <p class="rb-pending" id="hdThemPending" hidden>對方尚未給出評價。</p>
        </div>
      </div>
    </div>

  </div>

  <!-- contextual action -->
  <div class="actionbar" id="hdActionbar" hidden>
    <a class="btn btn-black btn--block btn--lg" id="hdAction" href="#">—</a>
  </div>
</main>

<script src="js/campus.js"></script>
<script>
  (function () {
    var role = CampusEats.getRole();
    var params = new URLSearchParams(location.search);
    var id = params.get("id");
    var order = id && CampusEats.getOrder(id);

    // unknown order, or viewing the wrong role's record → back to the list,
    // keeping the active role so we return to the right history, not the
    // orderer default.
    if (!order || order.owner !== role) {
      location.replace(CampusEats.withRole("my-orders.html", role));
      return;
    }

    var $ = function (i) { return document.getElementById(i); };
    var cp = order.counterpart;
    var counterRole = role === "orderer" ? "帶餐者" : "訂餐者";
    var selfRoleLabel = CampusEats.roleLabel(role);

    // header + status
    $("hdId").textContent = id;
    $("hdId2").textContent = id;
    $("hdRest").textContent = order.restaurant;
    $("hdDate").textContent = "發布於 " + order.date;
    $("hdItems").textContent = order.items;
    $("hdSpot").textContent = order.spot;
    $("hdDeadline").textContent = order.deadline;
    $("hdFee").textContent = "$" + order.fee;

    var BADGE = {
      done:      { text: "已完成",  cls: "badge--done" },
      cancelled: { text: "已取消",  cls: "badge--cancelled" }
    };
    var b = BADGE[order.status] || BADGE.done;
    var badge = $("hdBadge");
    badge.textContent = b.text;
    badge.classList.add(b.cls);

    // counterpart (hidden when none, e.g. cancelled-before-match)
    if (cp) {
      $("hdPartyLabel").textContent = counterRole;
      $("hdAvatar").textContent = cp.initial;
      $("hdPartyName").textContent = counterRole + " " + cp.name;
      $("hdPartyRole").textContent = role === "orderer" ? "為你帶這份餐" : "你為對方帶餐";
    } else {
      $("hdPartyWrap").hidden = true;
    }

    // lifecycle timeline (read-only summary)
    var CHECK = "M20 6L9 17l-5-5";
    var XMARK = "M18 6L6 18M6 6l12 12";
    var tl = $("hdTimeline");
    order.timeline.forEach(function (title) {
      var cancel = title === "已取消";
      var step = document.createElement("div");
      step.className = "tl-step is-done" + (cancel ? " is-cancel" : "");
      var dot = document.createElement("div");
      dot.className = "tl-dot";
      var svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("viewBox", "0 0 24 24");
      var path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", cancel ? XMARK : CHECK);
      svg.appendChild(path);
      dot.appendChild(svg);
      var t = document.createElement("div");
      t.className = "tl-title";
      t.textContent = title;
      step.appendChild(dot);
      step.appendChild(t);
      tl.appendChild(step);
    });

    if (order.status === "cancelled") {
      // cancellation reason; no ratings
      $("hdCancelWrap").hidden = false;
      $("hdCancelReason").textContent = order.cancelReason || "訂單已取消。";
    } else {
      // two-way ratings
      $("hdRatingsWrap").hidden = false;
      $("hdYouLabel").textContent = "你給" + counterRole + "的評價";
      $("hdThemLabel").textContent = counterRole + "給你的評價";

      // rating you gave
      if (order.you && order.you.rated) {
        $("hdYouRated").hidden = false;
        $("hdYouStars").setAttribute("data-value", String(order.you.stars));
        if (order.you.tags && order.you.tags.length) {
          var tagWrap = $("hdYouTags");
          tagWrap.hidden = false;
          order.you.tags.forEach(function (tg) {
            var s = document.createElement("span");
            s.className = "tag";
            s.textContent = tg;
            tagWrap.appendChild(s);
          });
        }
        if (order.you.comment) {
          $("hdYouComment").hidden = false;
          $("hdYouComment").textContent = "「" + order.you.comment + "」";
        }
      } else {
        $("hdYouPending").hidden = false;
        var youCta = $("hdYouCta");
        youCta.hidden = false;
        youCta.href = "rating.html?role=" + role + "&id=" + id;
      }

      // rating you received
      if (order.them && order.them.rated) {
        $("hdThemRated").hidden = false;
        $("hdThemStars").setAttribute("data-value", String(order.them.stars));
        if (order.them.comment) {
          $("hdThemComment").hidden = false;
          $("hdThemComment").textContent = "「" + order.them.comment + "」";
        }
      } else {
        $("hdThemPending").hidden = false;
      }
    }

    // contextual primary action
    var bar = $("hdActionbar"), act = $("hdAction");
    if (order.status === "done" && order.you && !order.you.rated) {
      bar.hidden = false;
      act.textContent = "前往評價 " + counterRole;
      act.href = "rating.html?role=" + role + "&id=" + id;
    } else if (role === "orderer" && order.reorder) {
      bar.hidden = false;
      act.textContent = "再發一次";
      act.href = "post-order.html?reorder=" + order.reorder;
    }
  })();
</script>
</body>
</html>
